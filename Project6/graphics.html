<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Extreme Honeymoons - Graphics</title>

<style>

body {
    background-color: #ffe1a8; 
    background-image: url('images/2colback.jpg');
    background-repeat: repeat-y;
}

#thumbs, #image {
    width: 900px;
    text-align: center;
    margin: 0 auto;
    color: #000;
}

#thumbs {
    margin-top: 10px;
}

#thumbs img {
    border: solid 5px #C9CBA3;
    margin: 5px;
    width: 150px;
    height: auto;
}

#image {
    height: 500px;
}

.center {
    text-align: center;
}

</style>

<script>

logo1 = new Image();
logo2 = new Image();

if (document.images) {
    logo1.src = "images/logo1.jpg";
    logo2.src = "images/logo2.jpg";
}

var imgArray = [
    'CoupleBike1Lg.jpg',
    'CoupleEveningLg.jpg',
    'CoupleHikingLg.jpg',
    'SkiCouple1Lg.jpg'
];

var titleArray = [
    'Couple Biking',
    'Evening Couple',
    'Hiking Couple',
    'Skiing Couple'
];

var imgPath = "images/";

function swapImage(imgID) {
    var theImage = document.getElementById('theImage');
    var textDiv = document.getElementById('bottomText');

    theImage.src = imgPath + imgArray[imgID];
    textDiv.innerHTML = titleArray[imgID];
}

</script>

</head>
<body>


<div id="logo" class="center">
    <a href="logo.html" onMouseOver="document.logo.src=logo2.src;"
       onMouseOut="document.logo.src=logo1.src;">
        <br>
        <img src="images/logo1.jpg" width="150" height="150"
             name="logo" alt="logo" style="border:none;">
    </a>
</div>

<br><br><br>

<div id="thumbs">
    <img src="images/CoupleBike1Lg.jpg" alt="Couple Biking" onmouseover="swapImage(0);">
    <img src="images/CoupleEveningLg.jpg" alt="Evening Couple" onmouseover="swapImage(1);">
    <img src="images/CoupleHikingLg.jpg" alt="Hiking Couple" onmouseover="swapImage(2);">
    <img src="images/SkiCouple1Lg.jpg" alt="Skiing Couple" onmouseover="swapImage(3);">
</div>

<div id="image">
    <img id="theImage" src="images/CoupleBike1Lg.jpg" alt="Couple Biking" width="600">
    <h3 id="bottomText">Couple Biking</h3>
</div>

<br><br><br><br>

<p>
    <a href="http://validator.w3.org/check?uri=referer">
        <img src="http://www.w3.org/Icons/valid-xhtml10" alt="Valid XHTML 1.0 Transitional"
             height="31" width="88">
    </a>
</p>

</body>
</html>
